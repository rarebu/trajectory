name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # Format + clippy + tests + release build on current stable.
  # Tests include the testcontainers-based integration suite; GitHub's
  # ubuntu-latest runner ships with a working docker daemon.
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf-compiler
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Pre-pull test image
        run: docker pull postgis/postgis:15-3.4

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all-targets

      - name: cargo build --release
        run: cargo build --release

  # Build on the declared MSRV (see rust-version in Cargo.toml). Only
  # `cargo check` — we don't expect the same Rust version to build every
  # dev-dep's test harness.
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf-compiler
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends protobuf-compiler

      - uses: dtolnay/rust-toolchain@1.88

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --all-targets
